name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: read

env:
  PSSCRIPTANALYZER_VERSION: '1.24.0'

jobs:
  validate:
    name: Validate repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Scope CurrentUser -Force

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path . -Recurse -Include *.ps1,*.psm1,*.psd1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors) {
              $errors += $parseErrors | ForEach-Object { "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run security-focused PSScriptAnalyzer rules
        shell: pwsh
        run: |
          $securityRules = @(
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingComputerNameHardcoded',
            'PSAvoidUsingWMICmdlet',
            'PSAvoidUsingEmptyCatchBlock'
          )
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -IncludeRule $securityRules -Severity Warning,Error
          $results | Format-Table -AutoSize
          if (@($results).Count -gt 0) { exit 1 }

      - name: Validate JSON files and configuration schema
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Include *.json | ForEach-Object {
            Write-Output "Validating JSON syntax for $($_.FullName)"
            Get-Content -LiteralPath $_.FullName -Raw | ConvertFrom-Json | Out-Null
          }
          if (Get-Command Test-Json -ErrorAction SilentlyContinue) {
            $schema = Get-Content -LiteralPath ./config.schema.json -Raw
            $config = Get-Content -LiteralPath ./config.example.json -Raw
            if (-not (Test-Json -Json $config -Schema $schema)) {
              Write-Error 'config.example.json does not satisfy config.schema.json.'
              exit 1
            }
          }

      - name: Basic sensitive value scan
        shell: pwsh
        run: |
          function New-WordPattern([int[]]$Codes, [string]$Suffix) {
            return ((-join ($Codes | ForEach-Object { [char]$_ })) + $Suffix)
          }
          $patterns = @(
            New-WordPattern @(66,101,97,114,101,114) '\s+[A-Za-z0-9_\-\.]{20,}',
            New-WordPattern @(99,108,105,101,110,116,95,115,101,99,114,101,116) '\s*[=:]\s*[''"][^''"]+',
            New-WordPattern @(112,97,115,115,119,111,114,100) '\s*[=:]\s*[''"][^''"]+',
            ('api[_-]?' + 'key\s*[=:]\s*[''"][^''"]+')
          )
          $files = Get-ChildItem -Path . -Recurse -File | Where-Object { $_.FullName -notmatch '\.git' }
          $findings = @()
          foreach ($file in $files) {
            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($content -match $pattern) {
                $findings += "Potential sensitive value pattern found in $($file.FullName): $pattern"
              }
            }
          }
          if ($findings.Count -gt 0) {
            $findings | ForEach-Object { Write-Error $_ }
            exit 1
          }

  pester-windows:
    name: Run Windows behavior tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Windows behavior tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          function Assert-Condition {
            param([bool]$Condition, [string]$Message)
            Write-Output "CHECK: $Message"
            if (-not $Condition) { throw "FAILED CHECK: $Message" }
          }

          Write-Output 'Loading module and configuration.'
          $modulePath = Resolve-Path './src/SnipeItAzureSync.psm1'
          $configPath = Resolve-Path './config.example.json'
          $schemaPath = Resolve-Path './config.schema.json'
          $moduleSource = Get-Content -LiteralPath $modulePath -Raw
          $config = Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json
          Get-Content -LiteralPath $schemaPath -Raw | ConvertFrom-Json | Out-Null
          Import-Module -Name $modulePath -Force

          Write-Output 'Running module export checks.'
          $exported = @(Get-Command -Module SnipeItAzureSync | Select-Object -ExpandProperty Name)
          Assert-Condition ($exported.Count -eq 1 -and $exported[0] -eq 'Invoke-SnipeItAzureSync') 'Module must export only Invoke-SnipeItAzureSync.'

          Write-Output 'Running configuration policy checks.'
          Assert-Condition ($config.Sync.Mode -eq 'Plan') 'Example configuration must default to Plan mode.'
          Assert-Condition (-not ($config.Sync.UniqueMatchPriority -contains 'DeviceName')) 'DeviceName must not be a unique match key.'
          Assert-Condition ($config.Sync.FallbackMatchPriority -contains 'DeviceName') 'DeviceName must remain fallback-only.'
          Assert-Condition ($config.Sync.UniqueMatchPriority -contains 'AzureDeviceId') 'AzureDeviceId must remain a unique matching key.'
          Assert-Condition ($config.Sync.UniqueMatchPriority -contains 'IntuneDeviceId') 'IntuneDeviceId must remain a unique matching key.'

          Write-Output 'Running field mapping checks.'
          $enabledFields = @($config.Sync.UniqueMatchPriority) + @($config.Sync.FallbackMatchPriority) + @($config.Sync.UpdateFields)
          foreach ($field in @($enabledFields | Select-Object -Unique)) {
            Assert-Condition ($config.FieldMappings.PSObject.Properties.Name -contains $field) "Missing FieldMappings entry for $field."
            Assert-Condition (-not [string]::IsNullOrWhiteSpace([string]$config.FieldMappings.$field)) "Empty FieldMappings entry for $field."
          }

          Write-Output 'Running update-only API contract checks.'
          Assert-Condition ($moduleSource -match "ValidateSet\('GET', 'PATCH'\)") 'Snipe-IT request method set must remain update-only.'
          Assert-Condition ($moduleSource -notmatch "ValidateSet\('GET', 'POST'") 'POST must not be enabled for Snipe-IT API calls.'
          Assert-Condition ($moduleSource -notmatch "ValidateSet\('GET', 'DELETE'") 'DELETE must not be enabled for Snipe-IT API calls.'
          Assert-Condition ($moduleSource -match 'Apply mode requires explicit -AllowUpdate') 'Apply mode must require explicit update permission.'
          Assert-Condition ($moduleSource -match 'if \(-not \$Script:Runtime.AllowUpdate\)') 'Runtime update permission gate is missing.'

          Write-Output 'Running validation and path-safety checks.'
          Assert-Condition ($moduleSource -match 'function Assert-SyncConfigShape') 'Runtime configuration shape validation is missing.'
          Assert-Condition ($moduleSource -match 'Snipe-IT BaseUrl must use HTTPS') 'HTTPS validation is missing.'
          Assert-Condition ($moduleSource -match 'function Assert-SafeOutputParentPath') 'Safe output parent validation is missing.'
          Assert-Condition ($moduleSource.IndexOf('Assert-SafeOutputParentPath -Directory $Directory') -ge 0) 'Output parent validation call is missing.'
          Assert-Condition ($moduleSource.IndexOf('New-Item -ItemType Directory -Path $Directory') -ge 0) 'Output directory creation call is missing.'
          Assert-Condition ($moduleSource.IndexOf('Assert-SafeOutputParentPath -Directory $Directory') -lt $moduleSource.IndexOf('New-Item -ItemType Directory -Path $Directory')) 'Output parent path must be validated before directory creation.'

          Write-Output 'Running serialless matching checks.'
          Assert-Condition ($moduleSource -match "if \(\$KeyName -eq 'SerialNumber' -and \(Test-BadSerialNumber") 'Serialless matching guard is missing.'
          Assert-Condition ($moduleSource -match 'AzureDeviceId') 'AzureDeviceId handling is missing.'
          Assert-Condition ($moduleSource -match 'IntuneDeviceId') 'IntuneDeviceId handling is missing.'
          Write-Output 'Windows behavior contract checks passed.'

  certification-gate:
    name: Certification gate
    runs-on: ubuntu-latest
    needs:
      - validate
      - pester-windows
    if: always()

    steps:
      - name: Require all production gates to pass
        shell: pwsh
        run: |
          $required = @{
            'Validate repository hygiene' = '${{ needs.validate.result }}'
            'Run Windows behavior tests' = '${{ needs.pester-windows.result }}'
          }
          $failed = @($required.GetEnumerator() | Where-Object { $_.Value -ne 'success' })
          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Write-Error "$($_.Key) result was '$($_.Value)'" }
            exit 1
          }
          Write-Output 'All production certification gates passed.'
