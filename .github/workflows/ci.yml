name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: read

jobs:
  validate:
    name: Validate PowerShell and repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path . -Recurse -Include *.ps1,*.psm1,*.psd1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors) {
              $errors += $parseErrors | ForEach-Object { "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning,Error
          $results | Format-Table -AutoSize
          $errors = @($results | Where-Object Severity -eq 'Error')
          if ($errors.Count -gt 0) { exit 1 }

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./tests -CI

      - name: Validate JSON files
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Include *.json | ForEach-Object {
            Write-Host "Validating $($_.FullName)"
            Get-Content -LiteralPath $_.FullName -Raw | ConvertFrom-Json | Out-Null
          }

      - name: Basic secret scan
        shell: pwsh
        run: |
          $patterns = @(
            'Bearer\s+[A-Za-z0-9_\-\.]{20,}',
            'client_secret\s*[=:]\s*[''\"][^''\"]+',
            'password\s*[=:]\s*[''\"][^''\"]+',
            'api[_-]?key\s*[=:]\s*[''\"][^''\"]+'
          )
          $files = Get-ChildItem -Path . -Recurse -File | Where-Object { $_.FullName -notmatch '\\.git' }
          $findings = @()
          foreach ($file in $files) {
            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($content -match $pattern) {
                $findings += "Potential secret pattern found in $($file.FullName): $pattern"
              }
            }
          }
          if ($findings.Count -gt 0) {
            $findings | ForEach-Object { Write-Error $_ }
            exit 1
          }
