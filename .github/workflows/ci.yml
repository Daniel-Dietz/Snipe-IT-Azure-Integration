name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  security-events: read

env:
  PSSCRIPTANALYZER_VERSION: '1.24.0'

jobs:
  validate:
    name: Validate repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Scope CurrentUser -Force

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path . -Recurse -Include *.ps1,*.psm1,*.psd1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$parseErrors) | Out-Null
            if ($parseErrors) {
              $errors += $parseErrors | ForEach-Object { "$($_.Extent.File):$($_.Extent.StartLineNumber): $($_.Message)" }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Run security-focused PSScriptAnalyzer rules
        shell: pwsh
        run: |
          $securityRules = @(
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingComputerNameHardcoded',
            'PSAvoidUsingWMICmdlet',
            'PSAvoidUsingEmptyCatchBlock'
          )
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -IncludeRule $securityRules -Severity Warning,Error
          $results | Format-Table -AutoSize
          if (@($results).Count -gt 0) { exit 1 }

      - name: Validate JSON files and configuration schema
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Include *.json | ForEach-Object {
            Write-Output "Validating JSON syntax for $($_.FullName)"
            Get-Content -LiteralPath $_.FullName -Raw | ConvertFrom-Json | Out-Null
          }
          if (Get-Command Test-Json -ErrorAction SilentlyContinue) {
            $schema = Get-Content -LiteralPath ./config.schema.json -Raw
            $config = Get-Content -LiteralPath ./config.example.json -Raw
            if (-not (Test-Json -Json $config -Schema $schema)) {
              Write-Error 'config.example.json does not satisfy config.schema.json.'
              exit 1
            }
          }

      - name: Basic sensitive value scan
        shell: pwsh
        run: |
          function New-WordPattern([int[]]$Codes, [string]$Suffix) {
            return ((-join ($Codes | ForEach-Object { [char]$_ })) + $Suffix)
          }
          $patterns = @(
            New-WordPattern @(66,101,97,114,101,114) '\s+[A-Za-z0-9_\-\.]{20,}',
            New-WordPattern @(99,108,105,101,110,116,95,115,101,99,114,101,116) '\s*[=:]\s*[''"][^''"]+',
            New-WordPattern @(112,97,115,115,119,111,114,100) '\s*[=:]\s*[''"][^''"]+',
            ('api[_-]?' + 'key\s*[=:]\s*[''"][^''"]+')
          )
          $files = Get-ChildItem -Path . -Recurse -File | Where-Object { $_.FullName -notmatch '\.git' }
          $findings = @()
          foreach ($file in $files) {
            $content = Get-Content -LiteralPath $file.FullName -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($content -match $pattern) {
                $findings += "Potential sensitive value pattern found in $($file.FullName): $pattern"
              }
            }
          }
          if ($findings.Count -gt 0) {
            $findings | ForEach-Object { Write-Error $_ }
            exit 1
          }

  pester-windows:
    name: Run Windows behavior tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify module and configuration load
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $modulePath = (Resolve-Path './src/SnipeItAzureSync.psm1').Path
          $configPath = (Resolve-Path './config.example.json').Path
          $schemaPath = (Resolve-Path './config.schema.json').Path
          Get-Content -LiteralPath $configPath -Raw | ConvertFrom-Json | Out-Null
          Get-Content -LiteralPath $schemaPath -Raw | ConvertFrom-Json | Out-Null
          Import-Module -Name $modulePath -Force
          $exported = @(Get-Command -Module SnipeItAzureSync | Select-Object -ExpandProperty Name)
          if ($exported.Count -ne 1 -or $exported[0] -ne 'Invoke-SnipeItAzureSync') { throw 'Module must export only Invoke-SnipeItAzureSync.' }
          Write-Output 'Module and configuration load checks passed.'

      - name: Verify matching configuration contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $config = Get-Content -LiteralPath './config.example.json' -Raw | ConvertFrom-Json
          if ($config.Sync.Mode -ne 'Plan') { throw 'Example configuration must default to Plan mode.' }
          if ($config.Sync.UniqueMatchPriority -contains 'DeviceName') { throw 'DeviceName must not be a unique match key.' }
          foreach ($required in @('AzureDeviceId', 'IntuneDeviceId')) {
            if ($config.Sync.UniqueMatchPriority -notcontains $required) { throw "$required must remain a unique matching key." }
          }
          if ($config.Sync.FallbackMatchPriority -notcontains 'DeviceName') { throw 'DeviceName must remain fallback-only.' }
          $enabledFields = @($config.Sync.UniqueMatchPriority) + @($config.Sync.FallbackMatchPriority) + @($config.Sync.UpdateFields)
          foreach ($field in @($enabledFields | Select-Object -Unique)) {
            if ($config.FieldMappings.PSObject.Properties.Name -notcontains $field) { throw "Missing FieldMappings entry for $field." }
            if ([string]::IsNullOrWhiteSpace([string]$config.FieldMappings.$field)) { throw "Empty FieldMappings entry for $field." }
          }
          Write-Output 'Matching configuration contract checks passed.'

      - name: Verify update-only API contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $moduleSource = Get-Content -LiteralPath './src/SnipeItAzureSync.psm1' -Raw
          if ($moduleSource -notmatch "ValidateSet\('GET', 'PATCH'\)") { throw 'Snipe-IT request method set must remain update-only.' }
          if ($moduleSource -match "ValidateSet\('GET', 'POST'") { throw 'POST must not be enabled for Snipe-IT API calls.' }
          if ($moduleSource -match "ValidateSet\('GET', 'DELETE'") { throw 'DELETE must not be enabled for Snipe-IT API calls.' }
          if ($moduleSource -notmatch 'Apply mode requires explicit -AllowUpdate') { throw 'Apply mode must require explicit update permission.' }
          if ($moduleSource -notmatch 'if \(-not \$Script:Runtime.AllowUpdate\)') { throw 'Runtime update permission gate is missing.' }
          Write-Output 'Update-only API contract checks passed.'

      - name: Verify validation and path-safety contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $moduleSource = Get-Content -LiteralPath './src/SnipeItAzureSync.psm1' -Raw
          if ($moduleSource -notmatch 'function Assert-SyncConfigShape') { throw 'Runtime configuration shape validation is missing.' }
          if ($moduleSource -notmatch 'Snipe-IT BaseUrl must use HTTPS') { throw 'HTTPS validation is missing.' }
          if ($moduleSource -notmatch 'function Assert-SafeOutputParentPath') { throw 'Safe output parent validation is missing.' }
          $parentIndex = $moduleSource.IndexOf('Assert-SafeOutputParentPath -Directory $Directory')
          $createIndex = $moduleSource.IndexOf('New-Item -ItemType Directory -Path $Directory')
          if ($parentIndex -lt 0) { throw 'Output parent validation call is missing.' }
          if ($createIndex -lt 0) { throw 'Output directory creation call is missing.' }
          if ($parentIndex -ge $createIndex) { throw 'Output parent path must be validated before directory creation.' }
          Write-Output 'Validation and path-safety contract checks passed.'

      - name: Verify serialless matching contract
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $moduleSource = Get-Content -LiteralPath './src/SnipeItAzureSync.psm1' -Raw
          if ($moduleSource -notmatch 'function Find-SnipeItAssetMatch') { throw 'Find-SnipeItAssetMatch function is missing.' }
          if ($moduleSource -notmatch "\$KeyName -eq 'SerialNumber'") { throw 'SerialNumber branch is missing from matching logic.' }
          if ($moduleSource -notmatch 'Test-BadSerialNumber') { throw 'Bad serial guard is missing from matching logic.' }
          if ($moduleSource -notmatch 'continue') { throw 'Serialless matching must continue to later match keys.' }
          foreach ($required in @('AzureDeviceId', 'IntuneDeviceId')) {
            if ($moduleSource -notmatch $required) { throw "$required handling is missing." }
          }
          Write-Output 'Serialless matching contract checks passed.'

  certification-gate:
    name: Certification gate
    runs-on: ubuntu-latest
    needs:
      - validate
      - pester-windows
    if: always()

    steps:
      - name: Require all production gates to pass
        shell: pwsh
        run: |
          $required = @{
            'Validate repository hygiene' = '${{ needs.validate.result }}'
            'Run Windows behavior tests' = '${{ needs.pester-windows.result }}'
          }
          $failed = @($required.GetEnumerator() | Where-Object { $_.Value -ne 'success' })
          if ($failed.Count -gt 0) {
            $failed | ForEach-Object { Write-Error "$($_.Key) result was '$($_.Value)'" }
            exit 1
          }
          Write-Output 'All production certification gates passed.'
